<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wager confirmed · Focused</title>
  <meta name="theme-color" content="#fc6347">

  <!-- Favicon reuses the same logo, so replacing logo.png updates this too -->
  <link rel="icon" href="logo.png">

  <!-- Brand typeface -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --cream:#efece7; --card:#ffffff; --ink:#111111;
      --muted:#8a8a8a; --muted-2:#9a9a9a;
      --coral:#fc6347; --coral-deep:#b03a22;
      --coral-tint:#fff0ec; --coral-border:#ffd9cf;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;}
    body{
      background:var(--cream);
      font-family:'Space Grotesk',system-ui,-apple-system,sans-serif;
      color:var(--ink);
      display:flex; align-items:center; justify-content:center;
      min-height:100dvh; padding:24px;
      -webkit-font-smoothing:antialiased;
    }

    .card{
      position:relative; width:100%; max-width:400px;
      background:var(--card); border:1px solid #ececec; border-radius:36px;
      overflow:hidden; box-shadow:0 22px 60px rgba(0,0,0,.09);
      padding:30px 28px 28px; display:flex; flex-direction:column;
      min-height:min(680px, calc(100dvh - 48px));
      animation:rise .6s cubic-bezier(.2,.7,.2,1) both;
    }
    .card::before{
      content:""; position:absolute; inset:0 0 auto 0; height:340px;
      background:linear-gradient(180deg,#ffe4dd 0%,#fff4f1 42%,#ffffff 78%);
      pointer-events:none;
    }
    .card > *{position:relative;}

    /* ============ LOGO — swap logo.svg to change it on both pages ============ */
    .brand{display:flex; align-items:center;}
    .brand img{height:30px; width:auto; display:block;}
    /* ======================================================================== */

    .hero{
      display:flex; flex-direction:column; align-items:center;
      text-align:center; margin-top:52px;
    }
    .seal{
      width:88px; height:88px; border-radius:50%;
      background:#fff; border:1px solid var(--coral-border);
      box-shadow:0 10px 30px rgba(252,99,71,.18);
      display:flex; align-items:center; justify-content:center;
      animation:pop .5s .1s cubic-bezier(.2,1.3,.5,1) both;
    }
    .seal svg{width:40px; height:40px;}
    .seal .disc{transform-origin:center;}
    .seal .tick{
      stroke-dasharray:26; stroke-dashoffset:26;
      animation:draw .5s .45s ease forwards;
    }

    h1{font-size:30px; font-weight:700; letter-spacing:-.015em; line-height:1.12; margin-top:26px;}
    .sub{font-size:14px; font-weight:500; color:var(--muted); margin-top:10px; max-width:270px; text-wrap:pretty;}

    .badge{
      display:inline-flex; align-self:center; align-items:center; gap:8px;
      background:var(--coral-tint); border:1px solid var(--coral-border);
      border-radius:999px; padding:7px 14px; margin-top:24px;
    }
    .badge .dot{width:7px; height:7px; border-radius:50%; background:var(--coral); animation:pulse 1.8s ease-in-out infinite;}
    .badge .dot::after{content:""; position:absolute;}
    .badge span{font-weight:600; font-size:12px; color:var(--coral-deep);}

    /* Optional wager summary — appears only if amount/charity passed in the URL */
    .summary{
      display:none; margin-top:28px;
      border:1px solid #f0e8dd; border-radius:20px; overflow:hidden;
    }
    .summary.show{display:block;}
    .summary .row{display:flex; justify-content:space-between; align-items:center; padding:14px 18px;}
    .summary .row + .row{border-top:1px solid #f4eee6;}
    .summary .k{font-size:12.5px; font-weight:600; color:var(--muted-2);}
    .summary .v{font-size:14px; font-weight:600; color:var(--ink);}
    .summary .v.amount{color:var(--coral-deep);}

    .foot{margin-top:auto; display:flex; flex-direction:column; gap:14px; padding-top:28px;}
    .cta{
      display:block; text-align:center; text-decoration:none;
      background:var(--coral); color:#fff; font-weight:600; font-size:15px;
      padding:15px 20px; border-radius:16px;
      box-shadow:0 8px 20px rgba(252,99,71,.28);
      transition:transform .15s ease, box-shadow .15s ease;
    }
    .cta:hover{transform:translateY(-1px); box-shadow:0 12px 26px rgba(252,99,71,.34);}
    .cta:active{transform:translateY(0);}
    .note{text-align:center; font-weight:500; font-size:12.5px; color:var(--muted-2);}

    a:focus-visible, .cta:focus-visible{outline:2px solid var(--coral); outline-offset:3px; border-radius:16px;}

    @keyframes rise{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:none;}}
    @keyframes pop{from{opacity:0; transform:scale(.7);} to{opacity:1; transform:scale(1);}}
    @keyframes draw{to{stroke-dashoffset:0;}}
    @keyframes pulse{0%,100%{opacity:1; transform:scale(1);} 50%{opacity:.35; transform:scale(.82);}}

    @media (prefers-reduced-motion:reduce){
      *{animation:none !important;}
      .seal .tick{stroke-dashoffset:0;}
    }
  </style>
</head>
<body>
  <main class="card">
    <!-- LOGO (icon + wordmark, 600x150): to change it, just replace logo.png in the repo -->
    <div class="brand">
      <img src="logo.png" alt="Focused">
    </div>

    <div class="hero">
      <div class="seal">
        <svg viewBox="0 0 40 40" fill="none" aria-hidden="true">
          <circle class="disc" cx="20" cy="20" r="19" fill="#fc6347"/>
          <path class="tick" d="M12 20.5 L17.5 26 L28 15" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <h1>Your wager is live</h1>
      <p class="sub">Your card was charged. Stay under your limit and every dollar comes back to you.</p>

      <div class="badge"><span class="dot"></span><span>Starts right now</span></div>

      <!-- Filled in from URL params if present, e.g. ?amount=15&charity=St.%20Jude -->
      <div class="summary" id="summary">
        <div class="row"><span class="k">Wager</span><span class="v amount" id="v-amount">—</span></div>
        <div class="row" id="row-charity"><span class="k">Backed by</span><span class="v" id="v-charity">—</span></div>
      </div>
    </div>

    <div class="foot">
      <p class="note">Receipt sent to your email</p>
    </div>
  </main>

  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var amount = p.get('amount');
      var charity = p.get('charity');
      var shown = false;

      if (amount) {
        var n = parseFloat(amount);
        document.getElementById('v-amount').textContent =
          isNaN(n) ? amount : '$' + n.toFixed(2);
        shown = true;
      } else {
        document.querySelector('#summary .row').style.display = 'none';
      }

      if (charity) {
        document.getElementById('v-charity').textContent = charity;
        shown = true;
      } else {
        document.getElementById('row-charity').style.display = 'none';
      }

      if (shown) document.getElementById('summary').classList.add('show');
    })();
  </script>
</body>
</html>
